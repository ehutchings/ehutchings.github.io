<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf=8">
        <meta name = "viewport" content = "width = device-width, initial-scale = 1.0">
        <title>Checkers Mobile App</title>
        <link rel = "stylesheet" href = "https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
        <style>
            h1{
                text-align: center;
            }

            column{
                margin-top: 1%;
                text-align: center;
            }

            .project-image{
                width: 100%;
            }

            @media only screen and (max-width:975px) {
                .project-image{
                    width: 50%;
                }
            }
        </style>
    </head>
    <body>
        <container class = "container">
            <row class="row">
                <column class = "col-sm-2">
                    <a href="index.html">Back to main page</a>
                </column>
            </row>
            <row class = "row">
                <column class = "col-lg-12">
                     <h2>Checkers Mobile App<br></h2>
                     <h4>Individual Project</h4>
                </column>
            </row>
            <row class = "row">
                <column class = "col-lg-12">
                    <p>This application allows two players to play checkers using one device.<br>

                </column>
            </row>
            <row class = "row">
                <column class = "col-lg-8 col-lg-offset-2">
                    <figure>
                        <img class = "project-image" src = "checkers.png">
                        <figcaption>Game state in which black must capture a white piece.</figcaption>
                    </figure>
                </column>
            </row>
            <row>
                <column class = "col-lg-12">
                    <a href="https://github.com/ehutchings/FinalProjectCheckers">Click here to view github repository.</a>
                </column>
            </row>
        </container>
